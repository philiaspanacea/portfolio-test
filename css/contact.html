    <div id="top" class="section">
      <div class="blurb">
        <h1>I would love to hear from you!</h1>
      </div>
    </div>

    <div class="contactWrapper">
      <div class="contactImage">
        <img src="images/headshot.jpg" alt="Headshot of Chanel Cunningham" />
      </div>
      <div class="contactBox">
        <div class="input">
          <div class="name"><p>First Name</p></div>
          <div class="name"><p>Last Name</p></div>
        </div>
        <div class="input">
          <div class="email"><p>Email</p></div>
        </div>
        <div class="inputLarge">
          <p>Message</p>
          <div class="messageBox"></div>
        </div>
        <div class="input">
          <div class="button"><p>Submit</p></div>
          <div class="linkedIn">
            <p>
              or Contact me on
              <a
                href="https://www.linkedin.com/in/chanel-j-c-0b1223272"
                target="_blank"
                >LinkedIn</a
              >!
            </p>
          </div>
        </div>
      </div>
    </div>
